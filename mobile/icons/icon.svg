<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#1a1f26"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- The loop glyph: a circular arrow with a hypothesis "spark" -->
  <g transform="translate(256 256)">
    <circle r="148" fill="none" stroke="url(#claw)" stroke-width="36" stroke-linecap="round"
            stroke-dasharray="700 200" transform="rotate(-30)"/>
    <polygon points="-30,-130 60,-160 30,-90" fill="url(#claw)"/>
    <circle r="22" fill="url(#claw)"/>
  </g>
</svg>
