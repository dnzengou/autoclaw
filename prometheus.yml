global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'autoclaw'
    static_configs:
      - targets: ['autoclaw:8080']
    metrics_path: /api/metrics/prometheus
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
