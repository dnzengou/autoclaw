app = "autoclaw-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RUST_LOG = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "performance-2x"
  memory = "4gb"

[mounts]
  source = "autoclaw_data"
  destination = "/app/.autoclaw"
