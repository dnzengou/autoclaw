name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rust:
    name: rust-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    ext: "" }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   ext: "", cross: true }
          - { os: macos-latest,   target: x86_64-apple-darwin,         ext: "" }
          - { os: macos-latest,   target: aarch64-apple-darwin,        ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,      ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (Linux arm64)
        if: matrix.cross == true
        run: cargo install cross --locked
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          bin="target/${{ matrix.target }}/release/autoclaw${{ matrix.ext }}"
          name="autoclaw-${{ matrix.target }}${{ matrix.ext }}"
          cp "$bin" "dist/$name"
          cd dist && (sha256sum "$name" || shasum -a 256 "$name") > "$name.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: autoclaw-${{ matrix.target }}
          path: dist/*

  build-go:
    name: go-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          name="autoclaw-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "dist/$name" .
          cd dist && sha256sum "$name" > "$name.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: autoclaw-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: [build-rust, build-go]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
