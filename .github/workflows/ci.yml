name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Docker builds live in docker.yml. Fly.io deploy lives in fly-deploy.yml (when FLY_API_TOKEN is set).
# This workflow owns the Rust and Go quality gates. All gates are blocking.

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --verbose

      - name: cargo build --release
        run: cargo build --release

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }

      - name: gofmt
        run: test -z "$(gofmt -l agent.go evo.go deals.go)"

      - name: go vet
        run: go vet .

      - name: go build
        run: go build .
