name: Build Android APK

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths: ["mobile/**", "ui/**", ".github/workflows/android.yml"]
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }

      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mobile/target
          key: ${{ runner.os }}-cargo-mobile-${{ hashFiles('mobile/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build UI
        working-directory: ui
        run: npm install && npm run build

      - name: Generate Tauri icons (Android needs the full pack)
        working-directory: mobile
        run: cargo tauri icon icons/icon.svg

      - name: Init Android project
        working-directory: mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: cargo tauri android init

      - name: Build APK
        working-directory: mobile
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: cargo tauri android build --apk

      - uses: actions/upload-artifact@v4
        with:
          name: autoclaw-android
          path: mobile/gen/android/app/build/outputs/apk/**/*.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/gen/android/app/build/outputs/apk/**/*.apk
